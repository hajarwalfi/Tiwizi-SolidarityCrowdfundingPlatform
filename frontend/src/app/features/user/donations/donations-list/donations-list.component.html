<div class="grid gap-4">
  @for (donation of donations; track donation.id) {
    <div
      class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm hover:shadow-md transition-shadow"
    >
      <div class="flex items-start justify-between gap-4">
        <!-- Left: Campaign Info -->
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-3 mb-3">
            <div
              class="w-12 h-12 rounded-full bg-tiwizi-accent/10 flex items-center justify-center flex-shrink-0"
            >
              <svg
                class="w-5 h-5 text-tiwizi-primary"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                ></path>
              </svg>
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="font-semibold text-gray-900 mb-1 truncate">
                <a
                  [routerLink]="['/campaigns', donation.campaignId]"
                  class="hover:text-tiwizi-primary transition-colors"
                >
                  {{ donation.campaignTitle }}
                </a>
              </h3>
              <p class="text-sm text-gray-500">{{ formatDate(donation.createdAt) }}</p>
            </div>
          </div>

        </div>

        <!-- Right: Amount & Status -->
        <div class="text-right flex-shrink-0">
          <p class="text-2xl font-bold text-tiwizi-primary mb-2">
            {{ formatAmount(donation.amount) }}
          </p>
          <app-status-badge [status]="donation.status"></app-status-badge>
          @if (donation.isAnonymous) {
            <p class="text-xs text-gray-500 mt-2">Anonymous donation</p>
          }
        </div>
      </div>

      <!-- Actions -->
      <div class="mt-4 pt-4 border-t border-gray-200 flex items-center justify-between">
        <a
          [routerLink]="['/campaigns', donation.campaignId]"
          class="text-sm font-medium text-tiwizi-primary hover:text-tiwizi-primary/80 transition-colors"
        >
          View campaign →
        </a>
        @if (donation.receiptUrl) {
          <a
            [href]="donation.receiptUrl"
            target="_blank"
            class="text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors flex items-center gap-1"
          >
            Receipt
          </a>
        }
      </div>
    </div>
  }
</div>
