<!-- Header -->
<div class="mb-8">
  <h1 class="text-3xl font-bold text-gray-900">My Donations</h1>
  <p class="text-gray-600">Track the impact of your generosity</p>
</div>

<!-- Loading State -->
<app-loading-spinner *ngIf="isLoading()" message="Loading your donations..."></app-loading-spinner>

<!-- Error State -->
@if (!isLoading() && error()) {
  <div class="bg-red-50 border border-red-200 rounded-xl p-6 text-center">
    <div class="text-4xl mb-4 text-red-400">!</div>
    <p class="text-red-800 font-semibold mb-4">{{ error() }}</p>
    <button
      (click)="loadDonations()"
      class="px-6 py-2 bg-tiwizi-primary text-white rounded-lg font-semibold hover:bg-tiwizi-primary/90 transition-colors"
    >
      Retry
    </button>
  </div>
}

<!-- Empty State -->
<app-empty-state
  *ngIf="!isLoading() && !error() && donations().length === 0"
  title="No donations yet"
  description="Start making a difference by supporting causes that matter to you"
  ctaText="Explore Campaigns"
  ctaRoute="/campaigns"
>
</app-empty-state>

<!-- Donations Content -->
@if (!isLoading() && !error() && donations().length > 0) {
  <div class="space-y-6">
    <!-- Stats Card (child component) -->
    <app-donations-stats-card [totalAmount]="getTotalDonated()" [count]="donations().length">
    </app-donations-stats-card>

    <!-- Donations List (child component) -->
    <app-donations-list [donations]="donations()"></app-donations-list>
  </div>
}
