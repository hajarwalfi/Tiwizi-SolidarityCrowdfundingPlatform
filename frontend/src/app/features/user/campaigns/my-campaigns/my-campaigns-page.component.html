<!-- Main Content -->
<div class="flex-1 min-w-0 max-w-5xl flex flex-col gap-8">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">My Campaigns</h1>
      <p class="text-gray-600 mt-1">Manage your campaigns and track your donations</p>
    </div>
    <a
      routerLink="/dashboard/campaigns/create"
      class="group inline-flex items-center gap-1.5 bg-tiwizi-primary text-white font-semibold px-4 py-2 rounded-full text-sm border border-tiwizi-primary hover:bg-white hover:text-tiwizi-primary hover:border-tiwizi-primary/20 transition-all duration-200 hover:shadow-md hover:shadow-tiwizi-primary/15 active:scale-[0.97]"
    >
      <svg
        class="w-4 h-4"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
      >
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
      New Campaign
    </a>
  </div>

  <!-- View Mode Tabs -->
  <div class="flex gap-5 overflow-x-auto p-1 w-full shrink-0 snap-x" style="scrollbar-width: none">
    <button
      (click)="setViewMode('beneficiary')"
      [class.ring-2]="viewMode() === 'beneficiary'"
      [class.ring-[#A855F7]/20]="viewMode() === 'beneficiary'"
      [class.opacity-80]="viewMode() !== 'beneficiary'"
      class="snap-start shrink-0 flex items-center gap-2 px-4 py-2.5 bg-white rounded-xl shadow-[0_2px_10px_rgba(0,0,0,0.03)] border border-transparent hover:border-gray-100 font-bold text-xs whitespace-nowrap transition-all hover:opacity-100"
    >
      <div class="w-6 h-6 rounded-md bg-[#F3E8FF] text-[#A855F7] flex items-center justify-center">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polygon
            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
          ></polygon>
        </svg>
      </div>
      My Campaigns
    </button>
    <button
      (click)="setViewMode('donor')"
      [class.ring-2]="viewMode() === 'donor'"
      [class.ring-[#65A30D]/20]="viewMode() === 'donor'"
      [class.opacity-80]="viewMode() !== 'donor'"
      class="snap-start shrink-0 flex items-center gap-2 px-4 py-2.5 bg-white rounded-xl shadow-[0_2px_10px_rgba(0,0,0,0.03)] border border-transparent hover:border-gray-100 font-bold text-xs whitespace-nowrap transition-all hover:opacity-100"
    >
      <div class="w-6 h-6 rounded-md bg-[#ECFCCB] text-[#65A30D] flex items-center justify-center">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
          ></path>
        </svg>
      </div>
      Supported Campaigns
    </button>
  </div>

  <!-- Beneficiary Tab -->
  @if (viewMode() === 'beneficiary') {
    <app-beneficiary-campaigns-tab
      [campaigns]="paginatedBeneficiaryCampaigns()"
      [isLoading]="isLoadingBeneficiary()"
      [activeFilter]="activeFilter()"
      [searchQuery]="searchQuery()"
      [currentPage]="beneficiaryPage()"
      [totalPages]="beneficiaryTotalPages()"
      (filterChanged)="onFilterChanged($event)"
      (searchChanged)="onSearchChanged($event)"
      (pageChanged)="beneficiaryPage.set($event)"
      (manageRequested)="onManageRequested($event)"
    >
    </app-beneficiary-campaigns-tab>
  }

  <!-- Manage Panel -->
  <app-campaign-manage-panel
    [campaign]="managedCampaign()"
    (closed)="managedCampaign.set(null)"
    (campaignUpdated)="onCampaignUpdated($event)"
    (campaignDeleted)="onCampaignDeleted($event)"
  ></app-campaign-manage-panel>

  <!-- Donor Tab -->
  @if (viewMode() === 'donor') {
    <app-donor-campaigns-tab
      [campaigns]="paginatedDonorCampaigns()"
      [isLoading]="isLoadingDonor()"
      [currentPage]="donorPage()"
      [totalPages]="donorTotalPages()"
      (pageChanged)="donorPage.set($event)"
    >
    </app-donor-campaigns-tab>
  }
</div>
