<section class="bg-white overflow-hidden flex flex-col pt-[80px] pb-6">
  <div class="max-w-[1200px] mx-auto px-6 lg:px-8 w-full">

    <!-- Header -->
    <div class="text-center mb-5">
      <h2 class="text-[clamp(1.6rem,2.6vw,2rem)] font-extrabold text-[#0D1117]">
        Choose your <span class="text-[#FF7A59]">cause</span>
      </h2>
      <p class="text-slate-400 text-xs mt-1 tracking-wide">10 categories — find what moves you</p>
    </div>

    <!-- Category Grid -->
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">

      <!-- Health -->
      <a routerLink="/campaigns" [queryParams]="{ category: 'HEALTH' }"
        class="group flex flex-col items-center py-4 px-3 rounded-2xl no-underline bg-white border border-slate-100 hover:border-rose-200 hover:-translate-y-1 hover:shadow-[0_8px_24px_rgba(239,68,68,0.10)] transition-all duration-200">
        <div class="w-11 h-11 rounded-xl bg-rose-50 flex items-center justify-center mb-2.5 group-hover:bg-rose-100 transition-colors duration-200">
          <svg class="w-5 h-5 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
          </svg>
        </div>
        <span class="font-bold text-[0.72rem] text-[#1A1A2E] group-hover:text-rose-500 transition-colors duration-200">Health</span>
      </a>

      <!-- Education -->
      <a routerLink="/campaigns" [queryParams]="{ category: 'EDUCATION' }"
        class="group flex flex-col items-center py-4 px-3 rounded-2xl no-underline bg-white border border-slate-100 hover:border-blue-200 hover:-translate-y-1 hover:shadow-[0_8px_24px_rgba(59,130,246,0.10)] transition-all duration-200">
        <div class="w-11 h-11 rounded-xl bg-blue-50 flex items-center justify-center mb-2.5 group-hover:bg-blue-100 transition-colors duration-200">
          <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
          </svg>
        </div>
        <span class="font-bold text-[0.72rem] text-[#1A1A2E] group-hover:text-blue-500 transition-colors duration-200">Education</span>
      </a>

      <!-- Emergency -->
      <a routerLink="/campaigns" [queryParams]="{ category: 'EMERGENCY' }"
        class="group flex flex-col items-center py-4 px-3 rounded-2xl no-underline bg-white border border-slate-100 hover:border-amber-200 hover:-translate-y-1 hover:shadow-[0_8px_24px_rgba(245,158,11,0.10)] transition-all duration-200">
        <div class="w-11 h-11 rounded-xl bg-amber-50 flex items-center justify-center mb-2.5 group-hover:bg-amber-100 transition-colors duration-200">
          <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
        </div>
        <span class="font-bold text-[0.72rem] text-[#1A1A2E] group-hover:text-amber-500 transition-colors duration-200">Emergency</span>
      </a>

      <!-- Housing -->
      <a routerLink="/campaigns" [queryParams]="{ category: 'HOUSING' }"
        class="group flex flex-col items-center py-4 px-3 rounded-2xl no-underline bg-white border border-slate-100 hover:border-green-200 hover:-translate-y-1 hover:shadow-[0_8px_24px_rgba(16,185,129,0.10)] transition-all duration-200">
        <div class="w-11 h-11 rounded-xl bg-green-50 flex items-center justify-center mb-2.5 group-hover:bg-green-100 transition-colors duration-200">
          <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 22V12h6v10" />
          </svg>
        </div>
        <span class="font-bold text-[0.72rem] text-[#1A1A2E] group-hover:text-green-600 transition-colors duration-200">Housing</span>
      </a>

      <!-- Food -->
      <a routerLink="/campaigns" [queryParams]="{ category: 'FOOD' }"
        class="group flex flex-col items-center py-4 px-3 rounded-2xl no-underline bg-white border border-slate-100 hover:border-orange-200 hover:-translate-y-1 hover:shadow-[0_8px_24px_rgba(249,115,22,0.10)] transition-all duration-200">
        <div class="w-11 h-11 rounded-xl bg-orange-50 flex items-center justify-center mb-2.5 group-hover:bg-orange-100 transition-colors duration-200">
          <svg class="w-5 h-5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M18 8h1a4 4 0 010 8h-1" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z" />
            <line stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" x1="6" y1="1" x2="6" y2="4" />
            <line stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" x1="10" y1="1" x2="10" y2="4" />
            <line stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" x1="14" y1="1" x2="14" y2="4" />
          </svg>
        </div>
        <span class="font-bold text-[0.72rem] text-[#1A1A2E] group-hover:text-orange-500 transition-colors duration-200">Food</span>
      </a>

      <!-- Community -->
      <a routerLink="/campaigns" [queryParams]="{ category: 'COMMUNITY' }"
        class="group flex flex-col items-center py-4 px-3 rounded-2xl no-underline bg-white border border-slate-100 hover:border-purple-200 hover:-translate-y-1 hover:shadow-[0_8px_24px_rgba(139,92,246,0.10)] transition-all duration-200">
        <div class="w-11 h-11 rounded-xl bg-purple-50 flex items-center justify-center mb-2.5 group-hover:bg-purple-100 transition-colors duration-200">
          <svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
        </div>
        <span class="font-bold text-[0.72rem] text-[#1A1A2E] group-hover:text-purple-500 transition-colors duration-200">Community</span>
      </a>

      <!-- Environment -->
      <a routerLink="/campaigns" [queryParams]="{ category: 'ENVIRONMENT' }"
        class="group flex flex-col items-center py-4 px-3 rounded-2xl no-underline bg-white border border-slate-100 hover:border-emerald-200 hover:-translate-y-1 hover:shadow-[0_8px_24px_rgba(5,150,105,0.10)] transition-all duration-200">
        <div class="w-11 h-11 rounded-xl bg-emerald-50 flex items-center justify-center mb-2.5 group-hover:bg-emerald-100 transition-colors duration-200">
          <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <span class="font-bold text-[0.72rem] text-[#1A1A2E] group-hover:text-emerald-600 transition-colors duration-200">Environment</span>
      </a>

      <!-- Disability -->
      <a routerLink="/campaigns" [queryParams]="{ category: 'DISABILITY' }"
        class="group flex flex-col items-center py-4 px-3 rounded-2xl no-underline bg-white border border-slate-100 hover:border-sky-200 hover:-translate-y-1 hover:shadow-[0_8px_24px_rgba(14,165,233,0.10)] transition-all duration-200">
        <div class="w-11 h-11 rounded-xl bg-sky-50 flex items-center justify-center mb-2.5 group-hover:bg-sky-100 transition-colors duration-200">
          <svg class="w-5 h-5 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <circle cx="12" cy="4" r="2" stroke-width="1.8" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M10 20.5a7 7 0 01-5.477-11.436C5.694 7.45 7.224 7 9 7h3l2 5h3a2 2 0 010 4h-3" />
          </svg>
        </div>
        <span class="font-bold text-[0.72rem] text-[#1A1A2E] group-hover:text-sky-500 transition-colors duration-200">Disability</span>
      </a>

      <!-- Children -->
      <a routerLink="/campaigns" [queryParams]="{ category: 'CHILDREN' }"
        class="group flex flex-col items-center py-4 px-3 rounded-2xl no-underline bg-white border border-slate-100 hover:border-pink-200 hover:-translate-y-1 hover:shadow-[0_8px_24px_rgba(236,72,153,0.10)] transition-all duration-200">
        <div class="w-11 h-11 rounded-xl bg-pink-50 flex items-center justify-center mb-2.5 group-hover:bg-pink-100 transition-colors duration-200">
          <svg class="w-5 h-5 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <polygon stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
          </svg>
        </div>
        <span class="font-bold text-[0.72rem] text-[#1A1A2E] group-hover:text-pink-500 transition-colors duration-200">Children</span>
      </a>

      <!-- Other -->
      <a routerLink="/campaigns" [queryParams]="{ category: 'OTHER' }"
        class="group flex flex-col items-center py-4 px-3 rounded-2xl no-underline bg-white border border-slate-100 hover:border-slate-300 hover:-translate-y-1 hover:shadow-[0_8px_24px_rgba(100,116,139,0.10)] transition-all duration-200">
        <div class="w-11 h-11 rounded-xl bg-slate-100 flex items-center justify-center mb-2.5 group-hover:bg-slate-200 transition-colors duration-200">
          <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7" />
          </svg>
        </div>
        <span class="font-bold text-[0.72rem] text-[#1A1A2E] group-hover:text-slate-600 transition-colors duration-200">Other</span>
      </a>

    </div>

  </div>
</section>
