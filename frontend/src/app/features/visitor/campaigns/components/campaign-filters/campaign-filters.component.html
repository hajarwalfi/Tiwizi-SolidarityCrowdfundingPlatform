<div style="background-color: #fdfbf7;">
  <div class="max-w-4xl mx-auto px-6 pt-10 pb-6">

    <!-- Grouped search bar -->
    <div class="flex items-stretch rounded-2xl border border-black/8 overflow-visible" style="background-color: #f5f0e8;">

      <!-- Search -->
      <div class="flex-1 relative">
        <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
          fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input
          type="text"
          [(ngModel)]="searchKeyword"
          (ngModelChange)="onSearchInput()"
          placeholder="Search campaigns..."
          class="w-full h-full pl-11 pr-4 py-4 bg-transparent text-sm text-gray-800 placeholder-gray-400 focus:outline-none"
        />
      </div>

      <div class="w-px bg-gray-100 self-stretch my-3"></div>

      <!-- City -->
      <div class="relative w-48">
        <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
          fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <input
          type="text"
          [(ngModel)]="locationFilter"
          (ngModelChange)="onLocationInput()"
          placeholder="City or region..."
          class="w-full h-full pl-11 pr-4 py-4 bg-transparent text-sm text-gray-800 placeholder-gray-400 focus:outline-none"
        />
      </div>

      <div class="w-px bg-gray-100 self-stretch my-3"></div>

      <!-- Category -->
      <div class="relative w-48">
        <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
          fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 6h16M4 10h16M4 14h8"/>
        </svg>
        <button
          type="button"
          (click)="categoryOpen = !categoryOpen"
          class="w-full h-full flex items-center justify-between pl-11 pr-4 py-4 bg-transparent text-sm focus:outline-none"
          [ngClass]="selectedCategory ? 'text-gray-800 font-semibold' : 'text-gray-400'"
        >
          <span>{{ selectedCategory ? getCategoryLabel(selectedCategory) : 'Category' }}</span>
          <svg class="w-3.5 h-3.5 text-gray-400 transition-transform shrink-0" [class.rotate-180]="categoryOpen"
            fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>

        @if (categoryOpen) {
          <div class="absolute top-full right-0 mt-2 w-52 bg-white border border-gray-100 rounded-2xl shadow-xl z-50 overflow-hidden py-1">
            <button
              type="button"
              (click)="onCategorySelect(''); categoryOpen = false"
              class="w-full text-left px-4 py-2.5 text-sm transition-colors"
              [ngClass]="!selectedCategory ? 'bg-orange-50 text-[#FF7A59] font-semibold' : 'text-gray-500 hover:bg-gray-50'"
            >All categories</button>
            <div class="h-px bg-gray-100 mx-3 my-1"></div>
            @for (cat of categoryItems; track cat.key) {
              <button
                type="button"
                (click)="onCategorySelect(cat.key); categoryOpen = false"
                class="w-full text-left px-4 py-2.5 text-sm transition-colors"
                [ngClass]="selectedCategory === cat.key ? 'bg-orange-50 text-[#FF7A59] font-semibold' : 'text-gray-600 hover:bg-gray-50'"
              >{{ cat.label }}</button>
            }
          </div>
        }
      </div>

    </div>

    <!-- Filter chips -->
    <div class="flex items-center justify-center gap-3 mt-5">
      <button
        (click)="onUrgentToggle()"
        class="px-5 py-2 rounded-full text-sm font-semibold whitespace-nowrap transition-all active:scale-95"
        [ngClass]="showUrgentOnly ? 'border border-[#FF594B] text-[#FF594B]' : 'text-gray-500 border border-black/10 hover:border-black/20'" style="background-color: #f5f0e8;"
      >Urgent</button>

      <button
        (click)="onDeadlineSoonToggle()"
        class="px-5 py-2 rounded-full text-sm font-semibold whitespace-nowrap transition-all active:scale-95"
        [ngClass]="showDeadlineSoon ? 'border border-[#FF594B] text-[#FF594B]' : 'text-gray-500 border border-black/10 hover:border-black/20'" style="background-color: #f5f0e8;"
      >Deadline soon</button>

      <button
        (click)="onNearlyFundedToggle()"
        class="px-5 py-2 rounded-full text-sm font-semibold whitespace-nowrap transition-all active:scale-95"
        [ngClass]="showNearlyFunded ? 'border border-[#FF594B] text-[#FF594B]' : 'text-gray-500 border border-black/10 hover:border-black/20'" style="background-color: #f5f0e8;"
      >Nearly funded</button>

      @if (hasActiveFilters) {
        <button
          (click)="onClearFilters()"
          class="flex items-center gap-1.5 px-4 py-2 text-sm font-semibold text-gray-400 hover:text-gray-600 border border-black/10 hover:border-black/20 rounded-full transition-all active:scale-95" style="background-color: #f5f0e8;"
        >
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
          </svg>
          Clear
        </button>
      }
    </div>

  </div>
</div>
