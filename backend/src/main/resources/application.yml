spring:
  application:
    name: Tiwizi

  datasource:
    url: jdbc:postgresql://localhost:5432/Tiwizi
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: BLISSFUL

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml

  jackson:
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 236784399461-dqnrvs5vslpre61i0si0k2082htosu1f.apps.googleusercontent.com
            client-secret: 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
            scope:
              - openid
              - profile
              - email

server:
  port: 8080
  forward-headers-strategy: framework
  error:
    include-message: always

# JWT Configuration
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
