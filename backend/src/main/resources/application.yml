spring:
  application:
    name: Tiwizi

  jpa:
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  profiles:
    active: local

server:
  port: 8080
  error:
    include-message: always

logging:
  level:
    "[com.tiwizi]": DEBUG
    "[org.springframework]": INFO

# Stripe Payment Configuration
stripe:
  api-key: ${STRIPE_SECRET_KEY:sk_test_your_key_here}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret_here}
  currency: mad # Moroccan Dirham
  success-url: ${FRONTEND_URL:http://localhost:4200}/donation/success
  cancel-url: ${FRONTEND_URL:http://localhost:4200}/donation/cancel

# Cloudinary Configuration
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:your_cloud_name}
  api-key: ${CLOUDINARY_API_KEY:your_api_key}
  api-secret: ${CLOUDINARY_API_SECRET:your_api_secret}
