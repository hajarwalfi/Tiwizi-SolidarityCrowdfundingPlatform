databaseChangeLog:
  - changeSet:
      id: 003-create-donations-table
      author: Hajar Walfi
      changes:
        - createTable:
            tableName: donations
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: campaign_id
                  type: varchar(36)
                  constraints:
                    nullable: false
              - column:
                  name: donor_id
                  type: varchar(36)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: decimal(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
                  defaultValue: PENDING
              - column:
                  name: message
                  type: varchar(500)
              - column:
                  name: is_anonymous
                  type: boolean
                  constraints:
                    nullable: false
                  defaultValueBoolean: false
              - column:
                  name: payment_method
                  type: varchar(50)
              - column:
                  name: payment_transaction_id
                  type: varchar(255)
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: paid_at
                  type: timestamp
              - column:
                  name: receipt_url
                  type: varchar(500)

        - addForeignKeyConstraint:
            baseTableName: donations
            baseColumnNames: campaign_id
            referencedTableName: campaigns
            referencedColumnNames: id
            constraintName: fk_donations_campaign
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: donations
            baseColumnNames: donor_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_donations_donor
            onDelete: CASCADE

        - createIndex:
            tableName: donations
            indexName: idx_donation_status
            columns:
              - column:
                  name: status

        - createIndex:
            tableName: donations
            indexName: idx_donation_created_at
            columns:
              - column:
                  name: created_at
