databaseChangeLog:
  - changeSet:
      id: 007-create-notifications-table
      author: Hajar Walfi
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: varchar(36)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: related_entity_id
                  type: varchar(36)
              - column:
                  name: is_read
                  type: boolean
                  constraints:
                    nullable: false
                  defaultValueBoolean: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: read_at
                  type: timestamp

        - addForeignKeyConstraint:
            baseTableName: notifications
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_notifications_user
            onDelete: CASCADE

        - createIndex:
            tableName: notifications
            indexName: idx_notification_user_read
            columns:
              - column:
                  name: user_id
              - column:
                  name: is_read

        - createIndex:
            tableName: notifications
            indexName: idx_notification_created_at
            columns:
              - column:
                  name: created_at