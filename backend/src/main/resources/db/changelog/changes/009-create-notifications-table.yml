databaseChangeLog:
  - changeSet:
      id: 009-create-notifications-table
      author: Hajar Walfi
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()::varchar
              - column:
                  name: user_id
                  type: varchar(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_notifications_user
                    references: users(id)
              - column:
                  name: campaign_id
                  type: varchar(36)
                  constraints:
                    foreignKeyName: fk_notifications_campaign
                    references: campaigns(id)
              - column:
                  name: type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: is_read
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
        - createIndex:
            tableName: notifications
            indexName: idx_notifications_user
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: notifications
            indexName: idx_notifications_is_read
            columns:
              - column:
                  name: is_read
        - createIndex:
            tableName: notifications
            indexName: idx_notifications_created_at
            columns:
              - column:
                  name: created_at