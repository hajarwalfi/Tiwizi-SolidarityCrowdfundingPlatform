  - changeSet:
      id: 022-seed-test-campaigns
      author: Hajar Walfi
      context: "!production"
      changes:
        - sql:
            sql: >-
              INSERT INTO campaigns (id, title, description, goal_amount, amount_collected, status, category, location, is_urgent, created_at, approved_at, creator_id) VALUES
              (gen_random_uuid(), 'Planting 500 Trees in Casablanca', 'Helping reforest the outskirts of Casablanca to improve air quality and create a greener urban environment.', 5000.00, 1200.00, 'ACTIVE', 'ENVIRONMENT', 'Casablanca', false, '2025-10-01 10:00:00', '2025-10-02 09:00:00', '63ff2228-f340-4cd2-a66b-6eaaa8a7de7a'),
              (gen_random_uuid(), 'Medical Supplies for Rural Clinic', 'Providing essential medicine and equipment to a small clinic in Chefchaouen serving hundreds of families.', 8000.00, 7500.00, 'ACTIVE', 'HEALTH', 'Chefchaouen', true, '2025-10-05 11:30:00', '2025-10-06 14:00:00', '63ff2228-f340-4cd2-a66b-6eaaa8a7de7a'),
              (gen_random_uuid(), 'School Kits for 100 Students', 'Back-to-school supplies for underprivileged children in Fes who cannot afford basic educational materials.', 3000.00, 450.00, 'ACTIVE', 'EDUCATION', 'Fes', false, '2025-10-10 09:15:00', '2025-10-11 10:00:00', '63ff2228-f340-4cd2-a66b-6eaaa8a7de7a'),
              (gen_random_uuid(), 'Winter Relief for Atlas Communities', 'Warm blankets and clothes for families in the High Atlas during winter. Urgent support needed before snowfall.', 12000.00, 0.00, 'PENDING', 'EMERGENCY', 'Marrakech', true, '2025-11-01 08:00:00', NULL, '63ff2228-f340-4cd2-a66b-6eaaa8a7de7a'),
              (gen_random_uuid(), 'Community Library Renovation', 'Repairing the roof and shelves of the neighborhood library in Rabat to make it safe and welcoming again.', 4500.00, 2100.00, 'ACTIVE', 'COMMUNITY', 'Rabat', false, '2025-09-15 14:00:00', '2025-09-16 11:00:00', '63ff2228-f340-4cd2-a66b-6eaaa8a7de7a'),
              (gen_random_uuid(), 'Beach Clean-up Initiative', 'Weekly beach cleaning sessions in Tanger to protect marine life and keep our coastline pristine.', 2000.00, 1800.00, 'ACTIVE', 'ENVIRONMENT', 'Tanger', false, '2025-08-20 09:00:00', '2025-08-21 10:00:00', 'b55e18c4-77da-46b3-adb8-828c53528756'),
              (gen_random_uuid(), 'Hearing Aids for Elderly', 'Helping 10 senior citizens in Agadir regain their hearing and reconnect with their families and community.', 15000.00, 3000.00, 'ACTIVE', 'HEALTH', 'Agadir', false, '2025-09-01 10:30:00', '2025-09-02 12:00:00', 'b55e18c4-77da-46b3-adb8-828c53528756'),
