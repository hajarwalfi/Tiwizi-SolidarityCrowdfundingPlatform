databaseChangeLog:
  - changeSet:
      id: create-favorites-table
      author: Hajar Walfi
      changes:
        - createTable:
            tableName: favorites
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: varchar(36)
                  constraints:
                    nullable: false
              - column:
                  name: campaign_id
                  type: varchar(36)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: favorites
            columnNames: user_id, campaign_id
            constraintName: uk_favorite_user_campaign

        - addForeignKeyConstraint:
            baseTableName: favorites
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_favorite_user
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: favorites
            baseColumnNames: campaign_id
            referencedTableName: campaigns
            referencedColumnNames: id
            constraintName: fk_favorite_campaign
            onDelete: CASCADE

        - createIndex:
            tableName: favorites
            indexName: idx_favorite_user
            columns:
              - column:
                  name: user_id

        - createIndex:
            tableName: favorites
            indexName: idx_favorite_campaign
            columns:
              - column:
                  name: campaign_id
