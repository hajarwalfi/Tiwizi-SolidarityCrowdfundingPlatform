databaseChangeLog:
  - changeSet:
      id: 002-create-campaigns-table
      author: Hajar Walfi
      changes:
        - createTable:
            tableName: campaigns
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()::varchar
              - column:
                  name: beneficiary_id
                  type: varchar(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_campaigns_beneficiary
                    references: users(id)
              - column:
                  name: title
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: category
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: goal_amount
                  type: decimal(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: current_amount
                  type: decimal(15,2)
                  defaultValue: "0.00"
              - column:
                  name: city
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: province
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false
                  defaultValue: "PENDING"
              - column:
                  name: trust_score
                  type: decimal(3,2)
                  defaultValue: "0.00"
              - column:
                  name: verification_status
                  type: varchar(50)
                  defaultValue: "PENDING"
              - column:
                  name: rejection_reason
                  type: text
              - column:
                  name: rib
                  type: varchar(24)
              - column:
                  name: is_urgent
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: is_featured
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: views_count
                  type: integer
                  defaultValue: "0"
              - column:
                  name: shares_count
                  type: integer
                  defaultValue: "0"
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: published_at
                  type: timestamp
              - column:
                  name: closed_at
                  type: timestamp
        - createIndex:
            tableName: campaigns
            indexName: idx_campaigns_beneficiary
            columns:
              - column:
                  name: beneficiary_id
        - createIndex:
            tableName: campaigns
            indexName: idx_campaigns_status
            columns:
              - column:
                  name: status
        - createIndex:
            tableName: campaigns
            indexName: idx_campaigns_category
            columns:
              - column:
                  name: category
        - createIndex:
            tableName: campaigns
            indexName: idx_campaigns_city
            columns:
              - column:
                  name: city