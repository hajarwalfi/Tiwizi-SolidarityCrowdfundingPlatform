databaseChangeLog:
  - changeSet:
      id: 002-create-campaigns-table
      author: Hajar Walfi
      changes:
        - createTable:
            tableName: campaigns
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: goal_amount
                  type: decimal(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: amount_collected
                  type: decimal(10,2)
                  constraints:
                    nullable: false
                  defaultValueNumeric: 0.00
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
                  defaultValue: PENDING
              - column:
                  name: category
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: location
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: rejection_reason
                  type: text
              - column:
                  name: priority_score
                  type: decimal(10,2)
                  defaultValueNumeric: 0.00
              - column:
                  name: trust_score
                  type: decimal(5,2)
                  defaultValueNumeric: 0.00
              - column:
                  name: is_urgent
                  type: boolean
                  constraints:
                    nullable: false
                  defaultValueBoolean: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
              - column:
                  name: approved_at
                  type: timestamp
              - column:
                  name: closed_at
                  type: timestamp
              - column:
                  name: deleted_at
                  type: timestamp
              - column:
                  name: creator_id
                  type: varchar(36)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: campaigns
            baseColumnNames: creator_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_campaigns_creator
            onDelete: CASCADE

        - createIndex:
            tableName: campaigns
            indexName: idx_campaign_status
            columns:
              - column:
                  name: status

        - createIndex:
            tableName: campaigns
            indexName: idx_campaign_category
            columns:
              - column:
                  name: category

        - createIndex:
            tableName: campaigns
            indexName: idx_campaign_location
            columns:
              - column:
                  name: location

        - createIndex:
            tableName: campaigns
            indexName: idx_campaign_priority_score
            columns:
              - column:
                  name: priority_score
