databaseChangeLog:
  - changeSet:
      id: 010-add-password-column
      author: Hajar Walfi
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: true

  - changeSet:
      id: 010-make-provider-id-nullable
      author: Hajar Walfi
      changes:
        - dropNotNullConstraint:
            tableName: users
            columnName: provider_id
            columnDataType: varchar(255)
