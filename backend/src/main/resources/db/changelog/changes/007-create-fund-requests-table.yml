databaseChangeLog:
  - changeSet:
      id: 007-create-fund-requests-table
      author: Hajar Walfi
      changes:
        - createTable:
            tableName: fund_requests
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()::varchar
              - column:
                  name: campaign_id
                  type: varchar(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_fund_requests_campaign
                    references: campaigns(id)
              - column:
                  name: requested_amount
                  type: decimal(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false
                  defaultValue: "PENDING"
              - column:
                  name: reviewed_by
                  type: varchar(36)
                  constraints:
                    foreignKeyName: fk_fund_requests_reviewer
                    references: users(id)
              - column:
                  name: reviewed_at
                  type: timestamp
              - column:
                  name: rejection_reason
                  type: text
              - column:
                  name: disbursed_at
                  type: timestamp
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
        - createIndex:
            tableName: fund_requests
            indexName: idx_fund_requests_campaign
            columns:
              - column:
                  name: campaign_id
        - createIndex:
            tableName: fund_requests
            indexName: idx_fund_requests_status
            columns:
              - column:
                  name: status