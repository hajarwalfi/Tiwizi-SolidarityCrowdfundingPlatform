databaseChangeLog:
  - changeSet:
      id: 004-create-documents-table
      author: Hajar Walfi
      changes:
        - createTable:
            tableName: documents
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()::varchar
              - column:
                  name: campaign_id
                  type: varchar(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_documents_campaign
                    references: campaigns(id)
              - column:
                  name: document_type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: file_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: file_url
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: file_size
                  type: bigint
              - column:
                  name: mime_type
                  type: varchar(100)
              - column:
                  name: cloudinary_public_id
                  type: varchar(255)
              - column:
                  name: uploaded_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
        - createIndex:
            tableName: documents
            indexName: idx_documents_campaign
            columns:
              - column:
                  name: campaign_id
        - createIndex:
            tableName: documents
            indexName: idx_documents_type
            columns:
              - column:
                  name: document_type