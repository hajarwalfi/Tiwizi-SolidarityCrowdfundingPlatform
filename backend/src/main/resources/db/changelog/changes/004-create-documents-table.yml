databaseChangeLog:
  - changeSet:
      id: 004-create-documents-table
      author: Hajar Walfi
      changes:
        - createTable:
            tableName: documents
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: campaign_id
                  type: varchar(36)
                  constraints:
                    nullable: false
              - column:
                  name: document_type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: file_url
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: cloudinary_public_id
                  type: varchar(255)
              - column:
                  name: uploaded_at
                  type: timestamp
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: documents
            baseColumnNames: campaign_id
            referencedTableName: campaigns
            referencedColumnNames: id
            constraintName: fk_documents_campaign
            onDelete: CASCADE