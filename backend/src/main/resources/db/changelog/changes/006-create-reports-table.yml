databaseChangeLog:
  - changeSet:
      id: 006-create-reports-table
      author: Hajar Walfi
      changes:
        - createTable:
            tableName: reports
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: campaign_id
                  type: varchar(36)
                  constraints:
                    nullable: false
              - column:
                  name: reporter_id
                  type: varchar(36)
                  constraints:
                    nullable: false
              - column:
                  name: reason
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
                  defaultValue: PENDING
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: resolved_at
                  type: timestamp
              - column:
                  name: reviewed_by
                  type: varchar(36)

        - addForeignKeyConstraint:
            baseTableName: reports
            baseColumnNames: campaign_id
            referencedTableName: campaigns
            referencedColumnNames: id
            constraintName: fk_reports_campaign
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: reports
            baseColumnNames: reporter_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_reports_reporter
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: reports
            baseColumnNames: reviewed_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_reports_reviewer
            onDelete: SET NULL

        - createIndex:
            tableName: reports
            indexName: idx_report_status
            columns:
              - column:
                  name: status

        - createIndex:
            tableName: reports
            indexName: idx_report_created_at
            columns:
              - column:
                  name: created_at
