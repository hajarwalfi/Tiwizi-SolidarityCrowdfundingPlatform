databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: Hajar Walfi
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: okta_id
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: full_name
                  type: varchar(255)
              - column:
                  name: first_name
                  type: varchar(100)
              - column:
                  name: last_name
                  type: varchar(100)
              - column:
                  name: phone_number
                  type: varchar(20)
              - column:
                  name: profile_picture_url
                  type: varchar(500)
              - column:
                  name: role
                  type: varchar(20)
                  constraints:
                    nullable: false
                  defaultValue: VISITOR
              - column:
                  name: is_email_verified
                  type: boolean
                  constraints:
                    nullable: false
                  defaultValueBoolean: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
              - column:
                  name: last_login_at
                  type: timestamp

        - createIndex:
            tableName: users
            indexName: idx_users_okta_id
            columns:
              - column:
                  name: okta_id

        - createIndex:
            tableName: users
            indexName: idx_users_email
            columns:
              - column:
                  name: email