databaseChangeLog:
  - changeSet:
      id: 005-create-campaign-updates-table
      author: Hajar Walfi
      changes:
        - createTable:
            tableName: campaign_updates
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: campaign_id
                  type: varchar(36)
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: photo_urls
                  type: text
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: campaign_updates
            baseColumnNames: campaign_id
            referencedTableName: campaigns
            referencedColumnNames: id
            constraintName: fk_campaign_updates_campaign
            onDelete: CASCADE

        - createIndex:
            tableName: campaign_updates
            indexName: idx_update_created_at
            columns:
              - column:
                  name: created_at