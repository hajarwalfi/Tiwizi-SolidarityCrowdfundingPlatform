databaseChangeLog:
  - changeSet:
      id: 015-align-users-table-v2
      author: Hajar Walfi
      changes:
        # Add missing columns to users table
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: full_name
                  type: varchar(255)
              - column:
                  name: phone_number
                  type: varchar(20)
              - column:
                  name: profile_picture_url
                  type: varchar(500)
              - column:
                  name: is_email_verified
                  type: boolean
                  defaultValueBoolean: false
