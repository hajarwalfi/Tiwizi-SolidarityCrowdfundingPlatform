spring:
  datasource:
    url: jdbc:h2:mem:tiwizi
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect

  liquibase:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://test.okta.com/oauth2/default

okta:
  oauth2:
    issuer: https://test.okta.com/oauth2/default
    client-id: test-client-id
    client-secret: test-client-secret
    audience: api://default

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000
  refresh-expiration: 604800000

app:
  oauth2:
    frontend-redirect-url: http://localhost:4200/oauth2/redirect
    frontend-error-url: http://localhost:4200/oauth2/error

logging:
  level:
    com.tiwizi: INFO
    org.springframework: WARN
    org.hibernate: WARN